<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-gravity Template</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <h1>Anti-gravity Template</h1>
                <p>Cursor / Frontend Sandbox</p>
            </div>
        </header>
        
        <main>
            <!-- System Status Section -->
            <section class="card status-section">
                <h2>Backend Concepts Status</h2>
                <div class="status-grid" id="status-grid">
                    <div class="status-box">Datatypes: <span id="dt-status">pending</span></div>
                    <div class="status-box">Variables: <span id="v-status">pending</span></div>
                    <div class="status-box">Data-Structures: <span id="ds-status">pending</span></div>
                    <div class="status-box">Flow Controls: <span id="fc-status">pending</span></div>
                </div>
                <button id="check-status-btn" class="btn">Check Backend</button>
            </section>
            
            <!-- ChatGPT -> Gemini Migration Tool -->
            <section class="card migration-section">
                <h2>ChatGPT to Gemini Engine</h2>
                <div class="migration-container">
                    <div class="input-group">
                        <label for="old-prompt">Legacy Prompt (ChatGPT):</label>
                        <textarea id="old-prompt" placeholder="Write a prompt here..."></textarea>
                    </div>
                    <div class="action-row">
                        <button id="migrate-btn" class="btn primary">Migrate</button>
                    </div>
                    <div class="input-group">
                        <label for="new-prompt">Optimized Prompt (Gemini):</label>
                        <textarea id="new-prompt" readonly placeholder="Result will appear here..."></textarea>
                    </div>
                </div>
                <p id="migration-msg" class="message"></p>
            </section>
        </main>
        
        <footer>
            <p>Demonstrating fundamentals visually.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
