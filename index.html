<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mini Project - Expense Tracker</title>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            outline: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: #60a5fa;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        #output {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9rem;
        }

        .badges p {
            margin: 10px 0 0 0;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Expense Tracker</h1>
        <p style="text-align:center; font-size:0.9rem; color:#cbd5e1; margin-bottom: 20px;">Built entirely in Python via
            PyScript!</p>

        <input type="text" id="itemName" placeholder="Item Name (String)">
        <input type="number" id="itemAmount" placeholder="Amount (Float)">
        <button id="addBtn" py-click="add_item">Add to Ledger</button>

        <div id="output">App starting (Loading Python Engine)... Please wait briefly.</div>

        <div class="badges">
            <p>Demonstrating: Variables | Datatypes | Data Structures | Flow Controls</p>
        </div>
    </div>

    <!-- Link to the main python logic -->
    <script type="py" src="./main.py"></script>
</body>

</html>
